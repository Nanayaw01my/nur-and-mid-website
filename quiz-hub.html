<script>
    (function() {
        // Bottom navigation
        const nav = document.createElement('div');
        nav.className = 'app-nav';
        const pages = [
            { name: 'Home', icon: 'home', file: 'index.html' },
            { name: 'Courses', icon: 'book', file: '#' },
            { name: 'Quiz', icon: 'question-circle', file: 'quiz-hub.html' },
            { name: 'Progress', icon: 'chart-line', file: '#' },
            { name: 'Profile', icon: 'user', file: '#' }
        ];
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        nav.innerHTML = pages.map(page => {
            const isActive = currentPage === page.file;
            return `<a href="${page.file}" class="nav-item ${isActive ? 'active' : ''}"><i class="fas fa-${page.icon}"></i><span>${page.name}</span></a>`;
        }).join('');
        document.body.appendChild(nav);

        // Progress bar
        const progressBar = document.createElement('div');
        progressBar.className = 'progress-bar';
        progressBar.innerHTML = '<div class="progress-fill"></div>';
        document.body.insertBefore(progressBar, document.body.firstChild);
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.querySelector('.progress-fill').style.width = scrolled + '%';
        });
    })();

            correct: Math.floor(Math.random() * 4)

    // ===== QUIZ ENGINE =====
    let currentQuestions = [];
    let userAnswers = [];
    let submitted = false;
    const root = document.getElementById('quizRoot');

    function pickRandomQuestions(n) {
        const shuffled = [...FULL_QUESTION_BANK].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, n);
    }

    function render() {
        if (!currentQuestions.length) {
            currentQuestions = pickRandomQuestions(30);
            userAnswers = new Array(30).fill(undefined);
            submitted = false;
        }

        let html = '<div class="quiz-container" id="quizBlock">';
        html += '<div class="stats">📚 1000+ questions • 30 random per quiz</div>';
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            html += `<div class="question-card">`;
            html += `<div class="question-meta"><span class="course-badge">${q.course}</span><span class="topic-badge">${q.topic}</span></div>`;
            html += `<div class="quiz-question">Q${i + 1}: ${q.question}</div>`;
            
            for (let o = 0; o < q.options.length; o++) {
                const opt = q.options[o];
                let classes = 'quiz-option';
                
                if (userAnswers[i] === o) classes += ' selected';
                
                if (submitted) {
                    if (o === q.correct) {
                        classes += ' correct';
                    } else if (userAnswers[i] === o && userAnswers[i] !== q.correct) {
                        classes += ' incorrect';
                    }
                }
                
                html += `<div class="${classes}" data-qidx="${i}" data-oidx="${o}">${opt}</div>`;
            }
            html += '</div>';
        }

        if (!submitted) {
            html += `<div class="quiz-controls">
                <button class="quiz-btn" id="submitQuiz">✅ Submit Answers</button>
                <button class="quiz-btn secondary" id="clearQuiz">🔄 Clear</button>
            </div>`;
        } else {
            let score = 0;
            for (let i = 0; i < currentQuestions.length; i++) {
                if (userAnswers[i] === currentQuestions[i].correct) score++;
            }
            html += `<div class="score-board">🎯 Score: ${score} / ${currentQuestions.length}</div>`;
            html += `<div class="quiz-controls">
                <button class="quiz-btn" id="resetQuiz">🆕 New Quiz (30 random)</button>
            </div>`;
        }
        html += '</div>';
        root.innerHTML = html;

        // Attach event listeners
        document.querySelectorAll('#quizBlock .quiz-option').forEach(opt => {
            opt.addEventListener('click', function(e) {
                if (submitted) return;
                const qidx = parseInt(this.dataset.qidx);
                const oidx = parseInt(this.dataset.oidx);
                userAnswers[qidx] = oidx;
                render();
            });
        });

        const submitBtn = document.getElementById('submitQuiz');
        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                for (let i = 0; i < currentQuestions.length; i++) {
                    if (userAnswers[i] === undefined) {
                        alert(`Please answer question ${i + 1} before submitting.`);
                        return;
                    }
                }
                submitted = true;
                render();
            });
        }

        const clearBtn = document.getElementById('clearQuiz');
        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                userAnswers = new Array(currentQuestions.length).fill(undefined);
                submitted = false;
                render();
            });
        }

        const resetBtn = document.getElementById('resetQuiz');
        if (resetBtn) {
            resetBtn.addEventListener('click', function() {
                currentQuestions = pickRandomQuestions(30);
                userAnswers = new Array(30).fill(undefined);
                submitted = false;
                render();
            });
        }

        // Touch feedback
        document.querySelectorAll('.quiz-option, .quiz-btn').forEach(el => {
            el.classList.add('touch-feedback');
        });
    }

    render();
</script>
